name: Build RustDesk Windows Client

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install NSIS
        run: choco install -y nsis

      - name: Build client
        run: |
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Pack (no installer)
        run: |
          rustdesk-utils pack -o rustdesk-client.exe -c .github/pubspecs/customize.toml target/x86_64-pc-windows-msvc/release/rustdesk.exe

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-client
          path: rustdesk-client.exe
