name: Build Windows RustDesk Client

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install dependencies
        run: |
          choco install -y nsis

      - name: Build RustDesk Client
        run: |
          cd rustdesk
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload rustdesk.exe
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-client
          path: rustdesk/target/x86_64-pc-windows-msvc/release/rustdesk.exe
